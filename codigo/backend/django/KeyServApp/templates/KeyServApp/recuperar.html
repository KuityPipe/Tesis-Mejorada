{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Recuperar Contraseña</title>
  <link rel="stylesheet" type="text/css" href="{% static 'KeyServApp/css/recuperar.css' %}">
</head>
<body>
  <div class="container">
    <h1 style="color: black">Recuperar Contraseña</h1>
    <form>
      <div class="form-group">
        <label style="color: black" for="correo">Correo Electrónico:</label>
        <input type="email" id="correo" name="correo" placeholder="Ingrese su correo electrónico" required 
               
               >
          
      </div>
      <div class="form-group">
        <label style="color: black" for="telefono">Número de Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ingrese su número de teléfono" required>
      </div>
      <div class="form-group">
        <label style="color: black" for="huella">Confirmar Huella:</label>
    
      </div>
      <button type="submit">Recuperar Contraseña</button>
    </form>
  </div>
</body>
</html>
