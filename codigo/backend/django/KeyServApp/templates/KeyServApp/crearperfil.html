{% extends "KeyServApp/base.html" %}

{% block titulo %}Perfil de proveedor — KeyServ{% endblock %}

{% block content %}
<section class="ks-section container" style="max-width: 640px;">
  <div class="ks-panel">
    <h1 class="mb-4"><i class="bi bi-briefcase"></i> Perfil de proveedor</h1>

    <div class="ks-info-note"><i class="bi bi-cone-striped"></i> Esta sección está en construcción — por ahora los cambios no se guardan todavía.</div>

    <form method="post" class="ks-form">
      {% csrf_token %}
      <div class="ks-field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre_usuario }}">
      </div>
      <div class="ks-field">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" name="direccion">
      </div>
      <div class="ks-field">
        <label for="habilidades">Habilidades</label>
        <textarea id="habilidades" name="habilidades" rows="3"></textarea>
      </div>
      <div class="ks-field">
        <label for="experiencia">Experiencia</label>
        <textarea id="experiencia" name="experiencia" rows="3"></textarea>
      </div>
      <div class="ks-field">
        <label for="foto">Foto de perfil</label>
        <input type="file" id="foto" name="foto">
      </div>
      <label class="ks-checkbox">
        <input type="checkbox" id="aceptar" name="aceptar" required>
        Acepto los <a href="{% url 'KeyServApp:preferencias_cuenta' %}">términos y condiciones</a>
      </label>
      <button type="submit" class="ks-btn ks-btn-primary">Guardar</button>
    </form>
  </div>
</section>
{% endblock %}
