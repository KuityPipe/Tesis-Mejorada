{% extends "KeyServApp/base.html" %}

{% block titulo %}Iniciar sesión — KeyServ{% endblock %}

{% block content %}
<section class="ks-section container" style="max-width: 420px;">
  <div class="ks-panel">
    <h1 class="text-center mb-1">Iniciar sesión</h1>
    <p class="text-center ks-help mb-4">Ingresa a tu cuenta de KeyServ.</p>

    <form method="post" class="ks-form">
      {% csrf_token %}
      <div class="ks-field">
        <label for="id_email">Correo electrónico</label>
        <input type="email" name="email" id="id_email" required autofocus>
      </div>
      <div class="ks-field">
        <label for="id_password">Contraseña</label>
        <input type="password" name="password" id="id_password" required>
      </div>
      <button type="submit" class="ks-btn ks-btn-primary w-100 justify-content-center">Iniciar sesión</button>
    </form>

    <div class="text-center mt-4">
      <p><a href="{% url 'KeyServApp:recuperar' %}">¿Olvidaste tu contraseña?</a></p>
      <p>¿No tienes cuenta? <a href="{% url 'KeyServApp:registro' %}">Regístrate</a></p>
      <p><a href="{% url 'KeyServApp:paginicio' %}">&larr; Volver al inicio</a></p>
    </div>
  </div>
</section>
{% endblock %}
