 <body>       
        
<link rel="stylesheet" href="{% static 'KeyServApp/css/pago.css' %}">

<form id="payment-form">
  <h2>Detalles de Pago</h2>
  <div class="form-group">
   
    <label for="card-number">Número de Tarjeta:</label>
    <input type="text" id="card-number" name="card-number" required number>
    
  </div>
  <div class="form-group">
    <label for="expiry-date">Fecha de Vencimiento:</label>
    <input type="text" id="expiry-date" name="expiry-date" required>
  </div>
  <div class="form-group">
    <label for="cvv">CVV:</label>
    <input type="text" id="cvv" name="cvv" required>
  </div>
  <div class="form-group">
    <label for="cardholder-name">Nombre del Titular:</label>
    <input type="text" id="cardholder-name" name="cardholder-name" required>
  </div>
  <div class="form-group">
    <label for="bank">Banco:</label>
    <select id="bank" name="bank">
      <option value="bank1">Banco 1</option>
      <option value="bank2">Banco 2</option>
      <option value="bank3">Banco 3</option>
    </select>
  </div>
  <div class="form-group">
    <input type="submit" value="Pagar">
  </div>
</form>


</body>
