<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Página de inicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="css/styleinicio.css">
  </head>


  <body>
    
    <header>
      <div class="logo">
        <img src="imagenes/logokeyserv.png" alt="Logo de mi web" >
      </div>
      <nav>
        <ul class="menu">
          <li><a href="/">Inicio</a></li>
          <li><a href="/Acercadeenosotros">Acerca de nosotros</a></li>
          <li><a href="/contacto">Contacto</a></li>
          <li><a href="/sesion">Inicio sesión</a></li>
          <li><a href="/registroinicio">Registrarse</a></li>
        </ul>
      </nav>
    </header>

    <div class="search-container">
      <h2>Búsqueda de servicios</h2>
      <div class="search-form">
        <input type="text" placeholder="Palabras clave o categorías">
        <div class="filter-dropdown">
          <button class="dropdown-btn">Filtros de búsqueda</button>
          <div class="dropdown-content">
            <label for="location">Ubicación:</label>
            <input type="text" id="location" name="location">
            <label for="price">Precio:</label>
            <select id="price" name="price">
              <option value="">Cualquier precio</option>
              <option value="1">$</option>
              <option value="2">$$</option>
              <option value="3">$$$</option>
            </select>
            <label for="rating">Calificación:</label>
            <select id="rating" name="rating">
              <option value="">Cualquier calificación</option>
              <option value="1">1 estrella</option>
              <option value="2">2 estrellas</option>
              <option value="3">3 estrellas</option>
              <option value="4">4 estrellas</option>
              <option value="5">5 estrellas</option>
            </select>
            <!-- Agrega más filtros según tus necesidades -->
          </div>
        </div>
        <button class="search-btn">Buscar</button>
      </div>
    </div>

    <div class="search-results">
      <!-- Aquí se mostrarán los resultados de búsqueda -->
    </div>

    <div class="sort-options">
      <label for="sort">Ordenar por:</label>
      <select id="sort" name="sort">
        <option value="price">Precio</option>
        <option value="rating">Calificación</option>
        <option value="distance">Distancia</option>
      </select>
      <label for="view">Vista:</label>
      <select id="view" name="view">
        <option value="list">Lista</option>
        <option value="grid">Cuadrícula</option>
      </select>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" 
    crossorigin="anonymous">
    </script>
  </body>
</html>
