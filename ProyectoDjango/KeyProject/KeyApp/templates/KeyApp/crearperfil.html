
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Registro de Perfiles</title>
  <style>
    form {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    input[type="file"] {
      margin-bottom: 10px;
    }

    input[type="checkbox"] {
      margin-top: 10px;
    }

    button {
      background-color: #0099cc;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0077b3;
    }
  </style>
</head>
<body>
  <form>
    <h2>Registro de Perfiles</h2>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" name="apellido" required>

    <label for="direccion">Dirección:</label>
    <input type="text" id="direccion" name="direccion" required>

    <label for="correo">Correo Electrónico:</label>
    <input type="email" id="correo" name="correo" required>

    <label for="telefono">Número de Teléfono:</label>
    <input type="tel" id="telefono" name="telefono" required>

    <label for="perfil">Tipo de Perfil:</label>
    <select id="perfil" name="perfil">
      <option value="proveedor">Proveedor</option>
      <option value="buscador">Buscador</option>
    </select>

    <label for="habilidades">Habilidades:</label>
    <textarea id="habilidades" name="habilidades" rows="4"></textarea>

    <label for="experiencia">Experiencia:</label>
    <textarea id="experiencia" name="experiencia" rows="4"></textarea>

    <label for="preferencias">Preferencias:</label>
    <textarea id="preferencias" name="preferencias" rows="4"></textarea>

    <label for="foto">Foto de Perfil:</label>
    <input type="file" id="foto" name="foto">

    <label for="aceptar">Acepto los términos y condiciones:</label>
    <input type="checkbox" id="aceptar" name="aceptar" required>

    <button type="submit">Registrarse</button>
      <a href="/sesion">  o inicie sesion</a>
  </form>
</body>
</html>
