 <body>       
        
<link rel="stylesheet" href="css/chat.css">
<section class="messaging-section">
  <h2 class="section-title">Mensajería</h2>
  <div class="chat-container">
    <div class="chat-message">
      <div class="message-bubble message-sender-a">Usuario A: ¡Hola! ¿Cómo estás?</div>
    </div>
    <div class="chat-message">
      <div class="message-bubble message-sender-b">Usuario B: ¡Hola! Estoy bien, ¿y tú?</div>
    </div>
    <!-- Agrega más mensajes según sea necesario -->
  </div>
  <div class="message-input">
    <input type="text" id="message-text" placeholder="Escribe tu mensaje...">
    <button class="send-button" onclick="sendMessage()">Enviar</button>
  </div>
</section>
     <script>
  function sendMessage() {
    var messageText = document.getElementById("message-text").value;
    if (messageText !== "") {
      var chatContainer = document.querySelector(".chat-container");
      var messageBubble = document.createElement("div");
      messageBubble.className = "chat-message";
      messageBubble.innerHTML = `<div class="message-bubble message-sender-a">Usuario A: ${messageText}</div>`;
      chatContainer.appendChild(messageBubble);
      document.getElementById("message-text").value = "";
    }
  }
</script>

</body>
