<link rel="stylesheet" href="stylecrearperfil.css">
 <form class="profile-form">
  <div class="form-group">
    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre completo" required>
  </div>
  <div class="form-group">
    <label for="telefono">Número de teléfono:</label>
    <input type="tel" id="telefono" name="telefono" placeholder="Ingrese su número de teléfono" required>
  </div>
  <div class="form-group">
    <label for="direccion">Dirección:</label>
    <input type="text" id="direccion" name="direccion" placeholder="Ingrese su dirección" required>
  </div>
  <div class="form-group">
    <label for="correo">Correo electrónico:</label>
    <input type="email" id="correo" name="correo" placeholder="Ingrese su correo electrónico" required>
  </div>
  <div class="form-group">
    <label for="etiquetas">Etiquetas:</label>
    <input type="text" id="etiquetas" name="etiquetas" placeholder="Ingrese etiquetas separadas por comas" required>
    <small>Ejemplo: plomería, electricidad, jardinería</small>
  </div>
  <button type="submit">Guardar</button>
</form>
