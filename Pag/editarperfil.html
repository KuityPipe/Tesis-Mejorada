<html>
<head>
  <meta charset="UTF-8">
  <title>Edición de Perfiles</title>
  <link rel="stylesheet" href="css/editarperfil.css">
</head>
<body>
  <form>
    <h2>Edición de Perfil</h2>

    <div class="profile-info">
      <h3>Información Personal</h3>
      <label for="name">Nombre:</label>
      <input type="text" id="name" name="name" placeholder="Ingrese su nombre">

      <label for="skills">Habilidades:</label>
      <textarea id="skills" name="skills" placeholder="Ingrese sus habilidades"></textarea>

      <label for="experience">Experiencia Laboral:</label>
      <textarea id="experience" name="experience" placeholder="Ingrese su experiencia laboral"></textarea>

      <label for="certifications">Certificaciones:</label>
      <textarea id="certifications" name="certifications" placeholder="Ingrese sus certificaciones"></textarea>
    </div>

    <div class="profile-settings">
      <h3>Configuraciones de Perfil</h3>
      <label for="price">Precio:</label>
      <input type="text" id="price" name="price" placeholder="Ingrese su precio">

      <label for="availability">Disponibilidad:</label>
      <input type="text" id="availability" name="availability" placeholder="Ingrese su disponibilidad">

      <label for="preferences">Preferencias:</label>
      <textarea id="preferences" name="preferences" placeholder="Ingrese sus preferencias"></textarea>
    </div>

    <div class="gallery">
      <h3>Galería de Trabajos Realizados</h3>
      <input type="file" name="images" multiple>
    </div>

    <button type="submit">Guardar Cambios</button>
  </form>
</body>
</html>
