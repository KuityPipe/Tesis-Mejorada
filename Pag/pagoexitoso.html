<!DOCTYPE html>
<html>
<head>
  <title>Pago Exitoso</title>
  <style>
    .payment-success {
      text-align: center;
    }

    .circle {
      display: inline-block;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background-color: #4caf50;
      color: #fff;
      line-height: 200px;
    }

    .text {
      font-size: 36px;
    }
  </style>
</head>
<body>
  <div class="payment-success">
    <div class="circle">
      <span class="text">Exitoso!</span>
    </div>
  </div>
</body>
</html>
