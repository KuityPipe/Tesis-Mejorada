<link rel="stylesheet" href="perfil.css">
 <div class="profile">
  <div class="profile-header">
    <div class="profile-avatar">
      <img src="ruta_a_la_imagen_de_perfil.jpg" alt="Imagen de perfil">
    </div>
    <div class="profile-info">
      <h2 class="profile-name">Nombre del Usuario</h2>
      <p class="profile-location">Ubicación</p>
      <p class="profile-email">Correo electrónico</p>
    </div>
  </div>
  <div class="profile-bio">
    <h3 class="section-title">Biografía</h3>
    <p class="profile-description">Descripción del usuario</p>
  </div>
  <div class="profile-tags">
    <h3 class="section-title">Etiquetas</h3>
    <ul class="tag-list">
      <li class="tag">Etiqueta 1</li>
      <li class="tag">Etiqueta 2</li>
      <li class="tag">Etiqueta 3</li>
      <!-- Agrega más etiquetas si es necesario -->
    </ul>
  </div>
</div>
