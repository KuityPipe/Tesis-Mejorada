<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyServ</title>
    <link rel="stylesheet" href="{% static 'css/registroinicio.css' %}">
  </head>
  
  <body>
    <div class="formulario">
      <h1>Iniciar Sesión</h1>
      <form method="post">
        {% csrf_token %}
        <div class="username">
          <input type="text" name="username" required>
          <label>Nombre</label>
        </div>
        
        <div class="username">
          <input type="password" name="password" required>
          <label>Contraseña</label>
        </div>
        
        <input type="submit" value="Iniciar Sesión"><br><br><br>
        <a href="recuperar.html">Recuperar Contraseña</a><br>
        <a href="registroinicio.html">Crear Cuenta</a><br>
        <a class="Inicio" href="paginicio.html">Volver al Inicio</a>
      </form>
    </div>
    
  </body>
</html>
